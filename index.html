<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Payment Gateway</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 60px 20px; background-color: #f8fafc; color: #1e293b; }
        .checkout-container { background: white; max-width: 480px; margin: 0 auto; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        .title { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        .btn-checkout { background-color: #10b981; color: white; padding: 16px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 16px; display: inline-block; transition: background 0.2s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-checkout:hover { background-color: #059669; }
        .accepted-cards { margin-top: 35px; font-size: 12px; color: #94a3b8; line-height: 1.8; border-top: 1px dashed #e2e8f0; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="title">Secure Checkout</div>
        <div class="subtitle">CT TNHH DVTM CN - Global Payment Service</div>
        
        <!-- THAY ĐƯỜNG LINK THANH TOÁN WOOSHPAY CỦA BẠN VÀO TRONG DẤU NGOẶC KÉP DƯỚI ĐÂY -->
        <a href="https://wooshpay.com" target="_blank" class="btn-checkout">
            Proceed to Payment
        </a>

        <div class="accepted-cards">
             Secured by WooshPay<br>
            Supported: Visa, Mastercard, American Express, Apple Pay, Google Pay
        </div>
    </div>

</body>
</html>
